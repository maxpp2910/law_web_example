<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Imagen abstracta de arquitectura clásica para el hero">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FBF5EF"/>
      <stop offset="48%" stop-color="#F4EBDD"/>
      <stop offset="100%" stop-color="#E8DDD1"/>
    </linearGradient>
    <linearGradient id="shadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A1F40" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#0A1F40" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="stone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F7EFE4"/>
      <stop offset="100%" stop-color="#D9C8B3"/>
    </linearGradient>
    <linearGradient id="terracotta" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#DA5A2E" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#DA5A2E" stop-opacity="0.18"/>
    </linearGradient>
    <filter id="blurSoft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1220" cy="190" r="260" fill="#0A1F40" fill-opacity="0.16"/>
  <circle cx="1450" cy="330" r="170" fill="#256670" fill-opacity="0.18"/>
  <path d="M820 610 L1600 520 L1600 900 L760 900 Z" fill="url(#shadow)"/>

  <g filter="url(#blurSoft)" opacity="0.95">
    <path d="M820 150 L1295 150 L1545 840 L560 840 Z" fill="#CDB69E"/>
    <path d="M1040 160 L1590 160 L1590 840 L1290 840 Z" fill="#0A1F40" fill-opacity="0.22"/>
    <path d="M930 225 L1130 225 L1210 820 L860 820 Z" fill="#F0E4D4"/>
    <path d="M1085 205 L1245 205 L1320 820 L1000 820 Z" fill="#D9C9B6"/>
    <path d="M1235 185 L1365 185 L1470 820 L1260 820 Z" fill="#CBB49E"/>
  </g>

  <g filter="url(#blurSoft)" opacity="0.8">
    <rect x="930" y="250" width="88" height="540" rx="20" fill="#FBF5EF"/>
    <rect x="1090" y="250" width="88" height="540" rx="20" fill="#F7EFE4"/>
    <rect x="1250" y="250" width="88" height="540" rx="20" fill="#EBDDCB"/>
    <rect x="1410" y="250" width="88" height="540" rx="20" fill="#D8C3AD"/>
    <rect x="860" y="210" width="720" height="42" rx="20" fill="#0A1F40" fill-opacity="0.24"/>
    <path d="M1470 180 L1600 180 L1600 860 L1415 860 Z" fill="#0A1F40" fill-opacity="0.34"/>
  </g>

  <g opacity="0.7">
    <rect x="930" y="234" width="760" height="580" rx="8" fill="none" stroke="#DA5A2E" stroke-opacity="0.12" stroke-width="3"/>
    <path d="M848 818 L1525 818" stroke="#0A1F40" stroke-opacity="0.12" stroke-width="4"/>
    <path d="M840 850 L1510 850" stroke="#0A1F40" stroke-opacity="0.06" stroke-width="18"/>
  </g>

  <g opacity="0.64" filter="url(#blurSoft)">
